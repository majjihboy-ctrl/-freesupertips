name: Run hybrid scraper

on:
  schedule:
    # Once a day at 00:01 East Africa Time (UTC+3) — the start of the
    # day. GitHub Actions cron always runs in UTC, so 00:01 EAT is
    # 21:01 UTC the PREVIOUS calendar day. If you're not actually in
    # EAT, adjust the hour: subtract your UTC offset from 00:01 (e.g.
    # UTC+0 -> '1 0 * * *', UTC+1 -> '1 23 * * *' the day before).
    #
    # Note: GitHub doesn't guarantee exact-minute timing for scheduled
    # workflows — during periods of high load across GitHub it can run
    # several minutes (rarely longer) after the scheduled time.
    - cron: '1 21 * * *'
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run hybrid scraper
        run: npm run scrape
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_BZZOIRO_API_KEY: ${{ secrets.VITE_BZZOIRO_API_KEY }}
